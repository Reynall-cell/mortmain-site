        p1: "Mortmain Studio выходит из темноты. Этот сайт открыт, а вместе с ним — Дозор: список тех, кто хочет узнать первым, когда начнётся темнота.",

(function() {
    var ID = "2026-06-10-gates-open";
    var ITEMS = null, IDX = -1;

    function lang() {
        var l = window.LANG;
        if (!l) { try { l = localStorage.getItem('mortmain_lang'); } catch (e) {} }
        return (l === 'ru' || l === 'uk') ? l : 'en';
    }

    var sb = document.getElementById('artShare');
    if (sb && navigator.clipboard) {
        sb.addEventListener('click', function() {
            navigator.clipboard.writeText(location.href).then(function() {
                var t = window.pageTranslations[lang()] || window.pageTranslations.en;
                sb.textContent = t.shared;
                sb.classList.add('done');
                setTimeout(function() {
                    var t2 = window.pageTranslations[lang()] || window.pageTranslations.en;
                    sb.textContent = t2.share;
                    sb.classList.remove('done');
                }, 2000);
            });
        });
    }

    function applyNav() {
        if (!ITEMS || IDX < 0) return;
        var L = lang();
        function set(el, item) {
            if (!el) return;
            if (!item) { el.style.visibility = 'hidden'; return; }
            el.style.visibility = '';
            el.href = '../' + item.url;
            var ttl = (item.title && (item.title[L] || item.title.en)) || '';
            var tEl = el.querySelector('.art-nav-title');
            if (tEl) tEl.textContent = ttl;
        }
        set(document.getElementById('artPrev'), ITEMS[IDX + 1]);
        set(document.getElementById('artNext'), ITEMS[IDX - 1]);
    }

    fetch('../news.json')
        .then(function(r) { if (!r.ok) throw 0; return r.json(); })
        .then(function(j) {
            ITEMS = j.sort(function(x, y) { return y.date.localeCompare(x.date); });
            IDX = ITEMS.findIndex(function(n) { return n.id === ID; });
            applyNav();
        })
        .catch(function() {});

    document.addEventListener('click', function(e) {
        if (e.target.closest && e.target.closest('.lang-option')) {
            setTimeout(applyNav, 60);
        }
    });
})();
