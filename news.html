<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All tidings — Squalor / Mortmain Studio</title>
    <meta name="description" content="News and forge reports from Mortmain Studio: every tiding about Squalor in one place.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Squalor — All tidings">
    <meta property="og:description" content="News and forge reports from Mortmain Studio.">
    <meta property="og:image" content="https://mortmainstudio.com/og-image.jpg">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="canonical" href="https://mortmainstudio.com/news.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .nh-feat {
            display: grid;
            grid-template-columns: minmax(280px, 1fr) minmax(0, 1.25fr);
            gap: 46px;
            align-items: center;
            margin: 0 auto 56px;
            padding: 36px 40px;
            background-color: rgba(12, 10, 8, 0.45);
        }
        .nh-feat:empty { display: none; }
        .nh-feat-date {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.64rem;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 16px;
        }
        .nh-feat-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: clamp(24px, 3vw, 38px);
            line-height: 1.12;
            color: var(--text-primary);
            margin-bottom: 16px;
        }
        .nh-feat-title a { color: inherit; text-decoration: none; transition: color 0.3s ease; }
        .nh-feat-title a:hover { color: var(--accent); }
        .nh-feat-rule {
            height: 1px;
            background: linear-gradient(90deg, var(--accent), rgba(201, 169, 97, 0.25), transparent);
            margin-bottom: 20px;
        }
        .nh-feat-ex {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 1.02rem;
            font-weight: 300;
            line-height: 1.85;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }
        .nh-btn {
            display: inline-block;
            position: relative;
            border: 1px solid rgba(201, 169, 97, 0.45);
            padding: 13px 38px;
            font-family: 'Jost', sans-serif;
            font-weight: 400;
            font-size: 0.68rem;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--accent);
            text-decoration: none;
            transition: background 0.35s ease, border-color 0.35s ease;
        }
        .nh-btn::before {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid rgba(201, 169, 97, 0.22);
            pointer-events: none;
            transition: border-color 0.3s ease;
        }
        .nh-btn:hover { background: rgba(201, 169, 97, 0.08); border-color: rgba(201, 169, 97, 0.75); }
        .nh-btn:hover::before { border-color: rgba(201, 169, 97, 0.45); }
        .nh-feat-img { display: block; overflow: hidden; }
        .nh-feat-img img {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            -webkit-mask-image: radial-gradient(120% 105% at 50% 50%, #000 58%, transparent 99%);
            mask-image: radial-gradient(120% 105% at 50% 50%, #000 58%, transparent 99%);
            transition: transform 0.6s ease;
        }
        .nh-feat-img:hover img { transform: scale(1.02); }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 26px;
        }
        .news-card {
            display: block;
            text-decoration: none;
            background-color: rgba(16, 13, 11, 0.5);
            padding: 26px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease;
        }
        .news-card:hover { transform: translateY(-3px); background-color: rgba(201, 169, 97, 0.03); }
        .news-card-img { margin: -26px -26px 18px; height: 152px; overflow: hidden; }
        .news-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            -webkit-mask-image: linear-gradient(180deg, #000 62%, transparent 100%);
            mask-image: linear-gradient(180deg, #000 62%, transparent 100%);
            transition: transform 0.55s ease;
        }
        .news-card:hover .news-card-img img { transform: scale(1.045); }
        .news-meta { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
        .news-tag {
            font-family: 'Jost', sans-serif;
            font-weight: 400;
            font-size: 0.56rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--border-medium);
            padding: 3px 10px;
        }
        .news-date {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.62rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-tertiary);
        }
        .news-card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.25;
            margin-bottom: 10px;
        }
        .news-card-excerpt {
            font-family: 'EB Garamond', serif;
            font-size: 0.95rem;
            font-weight: 300;
            line-height: 1.65;
            color: var(--text-secondary);
        }
        @media (max-width: 860px) {
            .nh-feat { grid-template-columns: 1fr; gap: 22px; padding: 22px 20px; }
            .nh-feat-img { order: -1; }
        }
    </style>
</head>
<body>

<div class="page-frame"><div class="corner-bl"></div><div class="corner-br"></div></div>

<nav id="nav">
    <a href="index.html" class="nav-brand">
        <svg class="nav-brand-mark" viewBox="0 0 40 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <polygon points="20,4 34,12 34,32 20,40 6,32 6,12" fill="none" stroke="#c9a961" stroke-width="1.3"/>
            <polygon points="20,8 30.5,14 30.5,30 20,36 9.5,30 9.5,14" fill="none" stroke="#c9a961" stroke-width="0.4" opacity="0.5"/>
            <text x="20" y="22" font-family="Cormorant Garamond, serif" font-size="14" font-weight="600" text-anchor="middle" dominant-baseline="central" fill="#d8d2c4">M</text>
        </svg>
        <span class="nav-brand-text">Mortmain Studio</span>
    </a>
    <div class="nav-right">
        <ul class="nav-links">
            <li><a href="index.html#game" data-i18n="nav_game">The Game</a></li>
            <li><a href="news.html" data-i18n="nav_news">News</a></li>
            <li><a href="about.html" data-i18n="nav_about">About</a></li>
        </ul>
        <div class="lang-switcher" id="langSwitcher">
            <button class="lang-current" id="langCurrent" aria-label="Language">
                <span id="langCurrentCode">EN</span>
                <span class="lang-caret">▾</span>
            </button>
            <div class="lang-menu" id="langMenu">
                <button class="lang-option active" data-lang="en">English</button>
                <button class="lang-option" data-lang="uk">Українська</button>
                <button class="lang-option" data-lang="ru">Русский</button>
            </div>
        </div>
    </div>
</nav>

<main class="page-wrapper">
    <div class="page-container" style="max-width:1100px">
        <h1 class="page-title" data-i18n="title">All tidings</h1>
        <div class="page-divider"><div class="page-divider-symbol">✠</div></div>

        <div class="nh-feat frame-ornate" id="newsFeat"></div>
        <div class="news-grid" id="newsGrid"></div>
    </div>
</main>

<footer>
    <div class="footer-bottom" style="border-top:none;padding-top:0">
        <div class="footer-copyright" data-i18n="footer_copyright">© MMXXVI · Mortmain Studio · All rights reserved</div>
        <div class="footer-contact"><a href="mailto:contact@mortmain.studio">contact@mortmain.studio</a></div>
        <ul class="footer-legal">
            <li><a href="privacy.html" data-i18n="legal_privacy">Privacy</a></li>
            <li><a href="terms.html" data-i18n="legal_terms">Terms</a></li>
        </ul>
    </div>
</footer>

<script>
window.pageTranslations = {
    en: {
        nav_game: "The Game",
        nav_news: "News",
        nav_about: "About",
        title: "All tidings",
        read: "Read more",
        footer_copyright: "© MMXXVI · Mortmain Studio · All rights reserved",
        legal_privacy: "Privacy",
        legal_terms: "Terms",
        tag_news: "News",
        tag_patch: "Patch"
    },
    ru: {
        nav_game: "Игра",
        nav_news: "Вести",
        nav_about: "О нас",
        title: "Все вести",
        read: "Читать",
        footer_copyright: "© MMXXVI · Mortmain Studio · Все права защищены",
        legal_privacy: "Приватность",
        legal_terms: "Условия",
        tag_news: "Новость",
        tag_patch: "Патч"
    },
    uk: {
        nav_game: "Гра",
        nav_news: "Вісті",
        nav_about: "Про нас",
        title: "Усі вісті",
        read: "Читати",
        footer_copyright: "© MMXXVI · Mortmain Studio · Усі права захищені",
        legal_privacy: "Приватність",
        legal_terms: "Умови",
        tag_news: "Новина",
        tag_patch: "Патч"
    }
};

(function() {
    var DATA = null;

    function lang() {
        var l = window.LANG;
        if (!l) { try { l = localStorage.getItem('mortmain_lang'); } catch (e) {} }
        return (l === 'ru' || l === 'uk') ? l : 'en';
    }
    function tr() { return window.pageTranslations[lang()] || window.pageTranslations.en; }
    function T(n) { var L = lang(); return (n.title && (n.title[L] || n.title.en)) || ''; }
    function X(n) { var L = lang(); return (n.excerpt && (n.excerpt[L] || n.excerpt.en)) || ''; }
    function tagLabel(tag) { return tr()['tag_' + tag] || tag; }
    function fmtDate(iso) {
        try { return new Date(iso + 'T00:00:00').toLocaleDateString(lang(), { year: 'numeric', month: 'long', day: 'numeric' }); }
        catch (e) { return iso; }
    }

    function render() {
        if (!DATA || !DATA.length) return;
        var f = DATA[0];
        document.getElementById('newsFeat').innerHTML =
            '<div class="nh-feat-info">'
            + '<div class="nh-feat-date">' + tagLabel(f.tag) + ' \u00B7 ' + fmtDate(f.date) + '</div>'
            + '<h2 class="nh-feat-title"><a href="' + f.url + '">' + T(f) + '</a></h2>'
            + '<div class="nh-feat-rule"></div>'
            + '<p class="nh-feat-ex">' + X(f) + '</p>'
            + '<a class="nh-btn" href="' + f.url + '">' + tr().read + '</a>'
            + '</div>'
            + '<a class="nh-feat-img" href="' + f.url + '" aria-hidden="true" tabindex="-1">'
            + '<img src="' + (f.image || 'og-image.jpg') + '" alt="" loading="lazy"></a>';

        document.getElementById('newsGrid').innerHTML = DATA.slice(1).map(function(n) {
            var im = n.image ? '<div class="news-card-img"><img src="' + n.image + '" alt="" loading="lazy"></div>' : '';
            return '<a class="news-card frame-ornate" href="' + n.url + '">' + im
                + '<div class="news-meta"><span class="news-tag">' + tagLabel(n.tag) + '</span>'
                + '<span class="news-date">' + fmtDate(n.date) + '</span></div>'
                + '<div class="news-card-title">' + T(n) + '</div>'
                + '<div class="news-card-excerpt">' + X(n) + '</div></a>';
        }).join('');
    }

    fetch('news.json')
        .then(function(r) { if (!r.ok) throw 0; return r.json(); })
        .then(function(j) {
            DATA = j.sort(function(a, b) { return b.date.localeCompare(a.date); });
            render();
        })
        .catch(function() {});

    document.addEventListener('click', function(e) {
        if (e.target.closest && e.target.closest('.lang-option')) {
            setTimeout(render, 60);
        }
    });
})();
</script>
<script src="shared.js"></script>

</body>
</html>
