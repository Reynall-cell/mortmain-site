            padding: 30px 8px;
            transition: background 0.3s ease, padding-left 0.3s ease;
        }

        .news-row:hover { background: rgba(201, 169, 97, 0.04); padding-left: 16px; }
        .news-row-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
        .news-row-tag {

            font-size: 9px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent-hover);

            padding: 3px 10px;

        .news-row-date {

            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
        }
        .news-row-title {

            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: var(--text-primary);
            line-height: 1.35;
            margin-bottom: 8px;
        }
        .news-row-excerpt {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
            max-width: 680px;

            -webkit-box-orient: vertical;

            color: var(--text-tertiary);

<script src="shared.js"></script>
<script>
(function() {
    var DATA = [];
    var FILTER = 'all';

    function lang() { return (window.MortmainI18n && window.MortmainI18n.LANG) || 'en'; }
    function dict() {
        var T = window.pageTranslations;
        return T[lang()] || T.en;
    }
    function t(key) {
        var d = dict();
        return (d[key] != null) ? d[key] : window.pageTranslations.en[key];
    }
    function fmtDate(iso) {
        try { return new Date(iso + 'T00:00:00').toLocaleDateString(lang(), { year: 'numeric', month: 'long', day: 'numeric' }); }
        catch (e) { return iso; }
    }

    function render() {
        var list = document.getElementById('newsList');
        var empty = document.getElementById('newsEmpty');
        var L = lang();
        var items = DATA.filter(function(n) { return FILTER === 'all' || n.tag === FILTER; });
        if (!items.length) {
            list.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        list.innerHTML = items.map(function(n) {
            var title = (n.title && (n.title[L] || n.title.en)) || '';
            var ex = (n.excerpt && (n.excerpt[L] || n.excerpt.en)) || '';
            return '<a class="news-row" href="' + n.url + '">' +
                '<div class="news-row-meta"><span class="news-row-tag">' + t('tag_' + n.tag) + '</span>' +
                '<span class="news-row-date">' + fmtDate(n.date) + '</span></div>' +
                '<div class="news-row-title">' + title + '</div>' +
                '<div class="news-row-excerpt">' + ex + '</div></a>';
        }).join('');
    }

    // filters
    document.querySelectorAll('.nf-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            FILTER = btn.dataset.filter;
            document.querySelectorAll('.nf-btn').forEach(function(b) { b.classList.toggle('active', b === btn); });
            render();
        });
    });

    // re-render on language change: wrap MortmainI18n.apply
    function hookI18n() {
        if (!window.MortmainI18n) return;
        var orig = window.MortmainI18n.apply.bind(window.MortmainI18n);
        window.MortmainI18n.apply = function(l) { orig(l); render(); };
    }
    hookI18n();

    fetch('news.json')
        .then(function(r) { if (!r.ok) throw 0; return r.json(); })
        .then(function(j) {
            DATA = j.sort(function(a, b) { return b.date.localeCompare(a.date); });
            render();
        })
        .catch(function() {
            document.getElementById('newsEmpty').style.display = 'block';
        });
})();
</script>
